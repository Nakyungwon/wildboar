name: Build Windows Installer

# 언제 실행되나:
#  - main 브랜치 push      → 설치파일을 빌드해 Artifact로 업로드 (다운로드 가능)
#  - v* 태그 push (예: v1.0.0) → 빌드 + GitHub Release 자동 생성/첨부
#  - 수동 실행 (Actions 탭의 Run workflow 버튼)
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # 태그 빌드 시 Release 생성에 필요

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # main push / 수동 실행: 누구나 Actions 탭에서 내려받을 수 있는 Artifact
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: wildboar-windows-setup
          path: |
            dist/*-setup.exe
            dist/*.exe
          if-no-files-found: error

      # v* 태그 push: GitHub Release 페이지에 설치파일 첨부
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*-setup.exe
            dist/*.exe
